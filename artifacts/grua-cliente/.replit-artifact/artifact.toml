kind = "mobile"
previewPath = "/"
title = "GruaYa - Cliente"
version = "1.0.0"
id = "artifacts/grua-cliente"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23844

[services.development]
run = "pnpm --filter @workspace/grua-cliente run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grua-cliente", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/grua-cliente", "run", "serve" ]

[services.env]
PORT = "23844"
BASE_PATH = "/"
